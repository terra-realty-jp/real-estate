name: 年次 公示地価データ更新

on:
  schedule:
    # 毎年3月25日 11:00 JST（公示地価公表の直後）
    - cron: '0 2 25 3 *'
  workflow_dispatch:

jobs:
  update-koji:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 公示地価データを取得
        run: node scripts/fetch-koji-prices.js
      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/koji-prices.json
          git diff --cached --quiet || git commit -m "data: 公示地価データを年次更新（$(date +'%Y-%m-%d')）" && git push origin main
