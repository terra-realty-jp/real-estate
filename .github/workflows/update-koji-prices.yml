name: 年次 公示地価データ更新

on:
  schedule:
    # 毎年3月25日 11:00 JST（公示地価公表の直後）
    - cron: '0 2 25 3 *'
  workflow_dispatch:

jobs:
  update-koji:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 不動産情報ライブラリ API から都道府県別単価を取得
        env:
          MLIT_API_KEY: ${{ secrets.MLIT_API_KEY }}
        run: node scripts/fetch-koji-prices.js
      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/koji-prices.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 公示地価データを年次更新（$(date +'%Y-%m-%d')）"
            git pull --rebase origin main
            git push origin main
          fi
