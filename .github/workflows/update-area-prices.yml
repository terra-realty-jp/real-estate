name: 月次 エリア単価データ更新

on:
  schedule:
    # 毎月1日 11:00 JST (= UTC 02:00)
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 不動産情報ライブラリ API からエリア単価を取得
        env:
          MLIT_API_KEY: ${{ secrets.MLIT_API_KEY }}
        run: node scripts/fetch-area-prices.js

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/area-prices.json
          if git diff --cached --quiet; then
            echo "変更なし - スキップ"
          else
            git commit -m "data: エリア単価データを月次更新（$(date +'%Y-%m-%d')）"
            git pull --rebase origin main
            git push origin main
          fi
