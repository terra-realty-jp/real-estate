name: Daily Implementation Report

on:
  schedule:
    # 毎日 19:00 JST (10:00 UTC) に実行
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Generate Daily HTML Report
        run: python3 scripts/generate-report.py

      - name: Commit Reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "report: $(TZ=Asia/Tokyo date '+%Y-%m-%d') 日次実装レポートを生成"
          git push
