name: 用途地域GeoJSON生成（稲毛区）

on:
  workflow_dispatch:
  schedule:
    # 都市計画は年1回更新が多いため、毎年5月1日に自動実行
    - cron: '0 3 1 5 *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 国土数値情報 A29（用途地域）GMLをダウンロード
        run: |
          wget -q \
            "https://nlftp.mlit.go.jp/ksj/gml/data/A29/A29-19/A29-19_12_GML.zip" \
            -O /tmp/a29.zip
          unzip -q /tmp/a29.zip -d /tmp/a29/
          echo "=== 展開されたファイル ==="
          find /tmp/a29 -type f | head -20

      - name: フィールド名を確認
        run: |
          GML=$(find /tmp/a29 -name "*.xml" | head -1)
          echo "GMLファイル: $GML"
          ogrinfo -al -so "$GML" 2>/dev/null | head -60 || echo "ogrinfo失敗"

      - name: GML→GeoJSON変換・稲毛区フィルタリング
        run: |
          GML=$(find /tmp/a29 -name "*.xml" | head -1)

          # 全千葉県をGeoJSONに変換（座標系をWGS84に統一）
          ogr2ogr \
            -f GeoJSON \
            -t_srs EPSG:4326 \
            -simplify 0.00005 \
            /tmp/yoto_all.geojson \
            "$GML"

          echo "全フィーチャー数: $(python3 -c "import json; d=json.load(open('/tmp/yoto_all.geojson')); print(len(d['features']))")"

          # Pythonで稲毛区（市区町村コード: 12103）を抽出
          python3 << 'EOF'
import json

with open('/tmp/yoto_all.geojson', encoding='utf-8') as f:
    data = json.load(f)

# 稲毛区のbounding box（余裕を持たせる）
NORTH, SOUTH = 35.700, 35.580
EAST,  WEST  = 140.175, 140.040

def centroid_in_box(coords_list):
    """座標リストの重心が稲毛区bboxに入るか"""
    try:
        flat = []
        def flatten(c):
            if isinstance(c[0], list):
                for x in c: flatten(x)
            else:
                flat.append(c)
        flatten(coords_list)
        if not flat:
            return False
        lng = sum(c[0] for c in flat) / len(flat)
        lat = sum(c[1] for c in flat) / len(flat)
        return SOUTH <= lat <= NORTH and WEST <= lng <= EAST
    except Exception:
        return False

def municipality_matches(props):
    """市区町村コードが稲毛区(12103)か千葉市(12100)を含むか"""
    for k, v in props.items():
        s = str(v)
        if '12103' in s or s == '12100':
            return True
    return False

features = []
for feat in data['features']:
    props = feat.get('properties') or {}
    geom  = feat.get('geometry') or {}
    coords = geom.get('coordinates', [])

    if municipality_matches(props) or centroid_in_box(coords):
        features.append(feat)

result = {'type': 'FeatureCollection', 'features': features}

with open('data/yoto-inage.geojson', 'w', encoding='utf-8') as f:
    json.dump(result, f, ensure_ascii=False, separators=(',', ':'))

print(f"稲毛区フィーチャー数: {len(features)}")
if features:
    print("サンプルproperties:", list(features[0]['properties'].keys())[:10])
EOF

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yoto-inage.geojson
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 用途地域GeoJSON更新（稲毛区・国土数値情報A29）"
            git push origin main
          fi
