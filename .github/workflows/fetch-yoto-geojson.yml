name: 用途地域GeoJSON生成（稲毛区）

on:
  workflow_dispatch:
  schedule:
    # 都市計画は年1回更新が多いため、毎年5月1日に自動実行
    - cron: '0 3 1 5 *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: GDAL（ogr2ogr）インストール（オプション）
        run: sudo apt-get install -y gdal-bin || echo "GDAL install skipped"

      - name: 国土数値情報 A29（用途地域）GMLをダウンロード
        run: |
          wget -q \
            "https://nlftp.mlit.go.jp/ksj/gml/data/A29/A29-19/A29-19_12_GML.zip" \
            -O /tmp/a29.zip
          unzip -q /tmp/a29.zip -d /tmp/a29/
          # 稲毛区（市区町村コード: 12103）の専用ファイルを直接指定
          ls /tmp/a29/A29-19_12/ -R | grep "12103" || echo "12103ファイルなし"

      - name: Python依存パッケージインストール
        run: pip install defusedxml

      - name: GML→GeoJSON変換（Pythonで直接パース）
        run: |
          # 稲毛区 (12103) または千葉市 (12100) の XML を使用
          GML=$(find /tmp/a29 -name "A29-19_12103.xml" | head -1)
          if [ -z "$GML" ]; then
            echo "稲毛区専用XMLが見つからない → 千葉市(12100)から抽出"
            GML=$(find /tmp/a29 -name "A29-19_12100.xml" | head -1)
          fi
          echo "使用ファイル: $GML"
          python3 scripts/gml-to-geojson.py "$GML" data/yoto-inage.geojson

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yoto-inage.geojson
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 用途地域GeoJSON更新（稲毛区・国土数値情報A29）"
            git push origin main
          fi
