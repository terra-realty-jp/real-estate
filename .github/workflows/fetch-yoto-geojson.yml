name: 用途地域GeoJSON生成（稲毛区）

on:
  workflow_dispatch:
  schedule:
    # 都市計画は年1回更新が多いため、毎年5月1日に自動実行
    - cron: '0 3 1 5 *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 国土数値情報 A29（用途地域）GMLをダウンロード
        run: |
          wget -q \
            "https://nlftp.mlit.go.jp/ksj/gml/data/A29/A29-19/A29-19_12_GML.zip" \
            -O /tmp/a29.zip
          unzip -q /tmp/a29.zip -d /tmp/a29/
          echo "=== 展開されたファイル ==="
          find /tmp/a29 -type f | head -20

      - name: フィールド名を確認
        run: |
          GML=$(find /tmp/a29 -name "*.xml" | head -1)
          echo "GMLファイル: $GML"
          ogrinfo -al -so "$GML" 2>/dev/null | head -60 || echo "ogrinfo失敗"

      - name: GML→GeoJSON変換・稲毛区フィルタリング
        run: |
          GML=$(find /tmp/a29 -name "*.xml" | head -1)

          ogr2ogr \
            -f GeoJSON \
            -t_srs EPSG:4326 \
            -simplify 0.00005 \
            /tmp/yoto_all.geojson \
            "$GML"

          echo "全フィーチャー数: $(python3 -c 'import json; d=json.load(open("/tmp/yoto_all.geojson")); print(len(d["features"]))')"
          python3 scripts/filter-yoto.py /tmp/yoto_all.geojson data/yoto-inage.geojson

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yoto-inage.geojson
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 用途地域GeoJSON更新（稲毛区・国土数値情報A29）"
            git push origin main
          fi
