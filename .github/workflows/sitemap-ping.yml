name: IndexNow送信（検索エンジンへのクロール通知）

# 旧 Google/Bing sitemap ping (www.google.com/ping 等) は2023-24年に廃止されたため、
# 後継プロトコル IndexNow (Bing/Naver/Seznam/Yandex が採用。BingはChatGPT/Copilot等の情報源) に移行。
# Google は IndexNow 非対応のため Search Console の sitemap 登録でカバーする。

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'llms.txt'
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 6:00 JST（再クロール促進）
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Submit all sitemap URLs to IndexNow
        run: node scripts/submit-indexnow.js
