name: 月次 金利データ更新

on:
  schedule:
    # 毎月2日 11:00 JST (= UTC 02:00) に実行（公示地価更新の翌日）
    - cron: '0 2 2 * *'
  workflow_dispatch:

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 金利データを取得
        run: node scripts/fetch-interest-rates.js
      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/interest-rates.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 金利データを月次更新（$(date +'%Y-%m-%d')）"
            git pull --rebase origin main
            git push origin main
          fi
