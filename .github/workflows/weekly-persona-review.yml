name: Weekly Persona UX Review

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  persona-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Generate UX Review Checklist
        run: python3 scripts/generate-persona-review.py

      - name: Commit Review Checklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add improvement-log.md
          if git diff --cached --quiet; then
            echo "No changes - skipping"
          else
            git commit -m "review: Weekly persona UX review checklist added ($(TZ=Asia/Tokyo date '+%Y-%m-%d'))"
            git pull --rebase origin main
            git push origin main
          fi
