name: 週次ペルソナ UXレビューリマインダー

on:
  schedule:
    # 毎週月曜 09:00 JST (= UTC 00:00) に実行
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  persona-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: ペルソナUXレビューチェックリストを生成してimprovement-logに追記
        run: |
          python3 << 'PYEOF'
          import subprocess, datetime, os

          def git(cmd):
              return subprocess.check_output(cmd, shell=True, text=True, errors='replace').strip()

          now_jst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          date_label = now_jst.strftime('%Y-%m-%d %H:%M')

          # 直近7日のコミット数を取得
          week_ago = (datetime.datetime.utcnow() - datetime.timedelta(days=7)).strftime('%Y-%m-%dT%H:%M:%S')
          log_raw = git(f"git log --format='%s' --after='{week_ago}'")
          commits_this_week = [l for l in log_raw.splitlines() if l.strip()]
          commit_count = len(commits_this_week)

          # 先週のlastペルソナレビューを確認
          log_path = 'improvement-log.md'
          try:
              with open(log_path, 'r', encoding='utf-8') as f:
                  log_content = f.read()
          except FileNotFoundError:
              log_content = ''

          # 改善ログへの追記内容
          entry = f"""
## {date_label}（週次ペルソナUXレビュー自動チェック）

- **フェーズ**: Phase 1/2 定期UXレビュー
- **改善内容**: 週次ペルソナUXレビューチェックリスト（GitHub Actions自動生成）
- **直近7日のコミット数**: {commit_count}件

### 🧑‍🤝‍🧑 今週のペルソナUXレビューチェックリスト

> 以下を確認してください（実施後にチェックを入れてください）

#### ペルソナ1: 田中みちこさん（52歳・専業主婦・スマホのみ・空き家相続）
- [ ] Tool2（空き家活用診断）のTOP3カードを読んで「自分のことだ」と感じるか
- [ ] 「家賃目安の立地選択」ドロップダウンが直感的に使えるか
- [ ] 解釈ガイドの文言に専門用語が残っていないか

#### ペルソナ2: 佐藤健一さん（47歳・会社員・投資初心者）
- [ ] Tool5（投資シミュレーター）の「この数字が良いのか悪いのか」の判断基準が見えるか
- [ ] 利回り・CF・DSCRの解釈ガイドが「なるほど」と思える内容か
- [ ] 金利・物件価格のデフォルト値が2026年の実態に合っているか

#### ペルソナ3: 鈴木幸子さん（58歳・パート・売却検討中）
- [ ] Tool1（AI物件査定）で「売ったらいくら手取り？」が2タップ以内でわかるか
- [ ] 手取り額・税金の計算結果が大きく・はっきり表示されているか
- [ ] 入力項目が多すぎて途中で萎えないか（5項目以内が理想）

### 📊 先週のコミット（上位10件）
"""
          for c in commits_this_week[:10]:
              entry += f"- {c}\n"

          entry += """
### 📝 レビュー結果メモ欄
（レビュー担当者が実施後にここに結果を記入してください）

- **実施日**:
- **確認者**:
- **発見した問題**:
- **対応内容**:

---
"""

          with open(log_path, 'a', encoding='utf-8') as f:
              f.write(entry)

          print(f"✅ 週次ペルソナレビューチェックリストを improvement-log.md に追記しました")
          print(f"   対象期間: 直近7日 / コミット数: {commit_count}件")
          PYEOF

      - name: Commit Review Checklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add improvement-log.md
          if git diff --cached --quiet; then
            echo "変更なし - スキップ"
          else
            git commit -m "review: 週次ペルソナUXレビューチェックリストを追記（$(TZ=Asia/Tokyo date '+%Y-%m-%d')）"
            git push origin main
          fi
