name: Push Report Email

on:
  push:
    branches: [ main ]

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Gather git info
        id: info
        run: |
          echo "hash=$(git log -1 --format='%h')" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT
          echo "time=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_OUTPUT
          {
            echo 'recent<<EOF'
            git log -5 --oneline
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Send HTML Report Email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          COMMIT_HASH: ${{ steps.info.outputs.hash }}
          COMMIT_MSG: ${{ steps.info.outputs.msg }}
          COMMIT_TIME: ${{ steps.info.outputs.time }}
          RECENT_COMMITS: ${{ steps.info.outputs.recent }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          pw           = os.environ["GMAIL_APP_PASSWORD"]
          commit_hash  = os.environ.get("COMMIT_HASH", "")
          commit_msg   = os.environ.get("COMMIT_MSG",  "")
          commit_time  = os.environ.get("COMMIT_TIME", "")
          recent_raw   = os.environ.get("RECENT_COMMITS", "")

          commit_rows = ""
          for line in recent_raw.strip().splitlines():
              parts = line.split(" ", 1)
              sha = parts[0] if parts else ""
              msg = parts[1] if len(parts) > 1 else line
              commit_rows += (
                  f'<tr>'
                  f'<td style="font-family:monospace;color:#888;padding:4px 10px;white-space:nowrap">{sha}</td>'
                  f'<td style="padding:4px 10px;color:#ddd">{msg}</td>'
                  f'</tr>'
              )

          html = f"""<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0e0e0e;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#e8e4db">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0e0e0e;padding:24px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%">

  <tr><td style="background:linear-gradient(135deg,#1a1a1a,#111);border-bottom:2px solid #c9a84c;border-radius:12px 12px 0 0;padding:28px 28px 20px;text-align:center">
    <div style="font-size:36px;margin-bottom:8px">🚀</div>
    <div style="font-size:20px;font-weight:900;color:#c9a84c;margin-bottom:4px">不動産ツール — プッシュ完了</div>
    <div style="font-size:13px;color:#888">{commit_time}</div>
  </td></tr>

  <tr><td style="background:#111;padding:22px 28px">
    <div style="font-size:11px;color:#c9a84c;font-weight:700;letter-spacing:1px;margin-bottom:8px">最新コミット</div>
    <div style="font-size:16px;font-weight:700;color:#e8e4db;line-height:1.5">{commit_msg}</div>
    <div style="font-family:monospace;font-size:11px;color:#888;margin-top:6px;background:#0e0e0e;padding:6px 10px;border-radius:4px;display:inline-block">{commit_hash}</div>
  </td></tr>

  <tr><td style="background:#161616;border-top:1px solid rgba(255,255,255,0.06);padding:18px 28px">
    <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:1px;margin-bottom:10px">直近5コミット</div>
    <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;font-size:12px;background:#0e0e0e;border-radius:6px">
      {commit_rows}
    </table>
  </td></tr>

  <tr><td style="background:#1a1a1a;border-top:1px solid rgba(201,168,76,0.3);padding:22px 28px;text-align:center;border-radius:0 0 12px 12px">
    <a href="https://shinji-japaaaan.github.io/real-estate/" style="display:inline-block;background:#c9a84c;color:#000;font-weight:700;font-size:13px;padding:11px 26px;border-radius:8px;text-decoration:none;margin-right:10px">ツールを開く →</a>
    <a href="https://github.com/shinji-japaaaan/real-estate/commits/main" style="display:inline-block;background:rgba(255,255,255,0.08);color:#ccc;font-size:12px;padding:11px 20px;border-radius:8px;text-decoration:none">GitHubで確認</a>
  </td></tr>

</table>
</td></tr>
</table>
</body></html>"""

          plain = f"[プッシュ完了] {commit_msg}\n{commit_time}\n\nURL: https://shinji-japaaaan.github.io/real-estate/"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"🚀 プッシュ完了: {commit_msg[:60]}"
          msg["From"] = "shinji.japaaan@gmail.com"
          msg["To"]   = "shinji.japaaan@gmail.com"
          msg.attach(MIMEText(plain, "plain",  "utf-8"))
          msg.attach(MIMEText(html,  "html",   "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login("shinji.japaaan@gmail.com", pw)
              server.sendmail("shinji.japaaan@gmail.com", "shinji.japaaan@gmail.com", msg.as_string())

          print(f"✅ メール送信完了: {commit_msg[:60]}")
          PYEOF
