<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c97a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#gold)"/>
  <!-- Decorative circle -->
  <circle cx="960" cy="315" r="280" fill="#c9a84c" opacity="0.04"/>
  <circle cx="960" cy="315" r="200" fill="#c9a84c" opacity="0.04"/>
  <!-- Icon area - house icon simplified -->
  <g transform="translate(100, 240)">
    <rect x="0" y="60" width="100" height="80" rx="4" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
    <polygon points="50,-10 -10,60 110,60" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
    <rect x="35" y="100" width="30" height="40" rx="2" fill="#c9a84c" opacity="0.5"/>
  </g>
  <!-- Main title -->
  <text x="240" y="260" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="72" font-weight="900" fill="url(#gold)">不動産かんたんツール</text>
  <!-- Subtitle -->
  <text x="242" y="320" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="28" font-weight="400" fill="#f0ede8" opacity="0.85">無料で使える不動産ツール集</text>
  <!-- Tool pills -->
  <g transform="translate(242, 360)">
    <rect x="0" y="0" width="168" height="36" rx="18" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
    <text x="84" y="24" font-family="sans-serif" font-size="14" fill="#c9a84c" text-anchor="middle">AI物件査定</text>
    <rect x="180" y="0" width="168" height="36" rx="18" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
    <text x="264" y="24" font-family="sans-serif" font-size="14" fill="#c9a84c" text-anchor="middle">空き家活用診断</text>
    <rect x="360" y="0" width="200" height="36" rx="18" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
    <text x="460" y="24" font-family="sans-serif" font-size="14" fill="#c9a84c" text-anchor="middle">投資シミュレーター</text>
  </g>
  <!-- Provider label -->
  <text x="242" y="440" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" fill="#999999">powered by TERRA REALTY</text>
  <!-- Free badge -->
  <rect x="242" y="460" width="80" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="282" y="479" font-family="sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">無料</text>
  <rect x="334" y="460" width="100" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="384" y="479" font-family="sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">登録不要</text>
  <rect x="446" y="460" width="120" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="506" y="479" font-family="sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">スマホ対応</text>
  <!-- Bottom border -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#gold)"/>
</svg>
